{# footer_django.html #}
{% load static i18n %}

<style>
  .wrapper-footer {
    background-color: #110D7C;
    color: #ffffff;
    padding: 15px 0 20px;
    font-family: 'Cairo', sans-serif !important;
    direction: rtl;
    border: none !important;
  }

  footer .footer-container {
    max-width: 1440px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 40px;
    text-align: right;
  }

  .footer-title {
    font-size: 30px;
    font-family: 'Cairo', sans-serif !important;
    font-weight: 700;
    color: #ffffff;
    white-space: nowrap;
  }

  .footer-brand img {
    width: 170px;
    height: auto;
  }

  .footer-top-links {
    display: flex;
    justify-content: flex-start;
    gap: 40px;
    font-size: 15px;
  }

  .footer-top-links a {
    color: #ffffff;
    text-decoration: none;
    font-weight: 500;
    font-family: 'Cairo', sans-serif !important;
  }

  .footer-top-links a:hover {
    text-decoration: underline;
  }

  .footer-policy-links {
    font-size: 14px;
  }

  .footer-policy-links span {
    font-size: 14px;
    font-weight: 400;
    color:#F09C59 !important;
    font-family: 'Cairo', sans-serif !important;
  }

  .footer-policy-links a {
    color: #ffffff;
    text-decoration: none;
    margin: 0 10px;
    font-family: 'Cairo', sans-serif !important;
  }

  .footer-policy-links a:hover {
    text-decoration: underline;
  }

  .social-icons ul {
    list-style: none;
    display: flex;
    justify-content: flex-start;
    padding: 0;
    margin: 0;
    gap: 8px;
  }

  .social-icons ul li:hover {
    background: #ffffff;
    transform: scale(1.1);
  }

  .social-icons ul li img {
    width: 34px;
    height: 34px;
    filter: brightness(0) invert(1);
  }

  .social-icons ul li:hover img {
    filter: brightness(0);
  }

  @media (max-width: 768px) {
    .footer-row {
      flex-direction: column;
      gap: 20px;
      text-align: center;
    }

    .footer-brand {
      justify-content: center;
    }

    .footer-top-links,
    .social-icons ul {
      justify-content: center;
      flex-wrap: wrap;
    }

    .footer-policy-links {
      text-align: center;
    }
  }
</style>

<div class="wrapper wrapper-footer">
  <footer dir="{{ LANGUAGE_BIDI|yesno:'rtl,ltr' }}">
    <div class="footer-container">

      {# 🔹 First Row #}
      <div class="footer-row">
        <div class="footer-brand">
          <div class="footer-title">مهارات المستقبل</div>
          <img src="{% static 'images/sbmf-logo.png' %}" alt="Salem Bin Mahfouz Foundation Logo">
        </div>

        <div class="footer-top-links">
          <a href="#">الأسئلة الشائعة</a>
          <a href="#">تواصل معنا</a>
          <a href="#">البريد الإلكتروني</a>
        </div>
      </div>

      {# 🔹 Second Row #}
      <div class="footer-row">
        <div class="footer-policy-links">
          <span>معلومات حقوق النشر تعود لمؤسسة سالم بن محفوظ</span>
          <a href="/privacy">سياسة الخصوصية</a>
          <a href="/tos">شروط الخدمة</a>
        </div>

        <div class="social-icons">
          <ul>
            <li><a href="#"><img src="{% static 'images/facebook.png' %}" alt="Facebook"></a></li>
            <li><a href="#"><img src="{% static 'images/x.png' %}" alt="X"></a></li>
            <li><a href="#"><img src="{% static 'images/instagram.png' %}" alt="Instagram"></a></li>
            <li><a href="#"><img src="{% static 'images/youtube.png' %}" alt="YouTube"></a></li>
            <li><a href="#"><img src="{% static 'images/linkedin.png' %}" alt="LinkedIn"></a></li>
            <li><a href="#"><img src="{% static 'images/tiktok.png' %}" alt="TikTok"></a></li>
            <li><a href="#"><img src="{% static 'images/snapchat.png' %}" alt="Snapchat"></a></li>
          </ul>
        </div>
      </div>

    </div>
  </footer>
</div>
