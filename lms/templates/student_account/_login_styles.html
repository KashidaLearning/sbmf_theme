<style>
.password-input-wrapper {
    position: relative;
}
.password-input-wrapper input {
    padding-inline-end: 40px !important;
}
.password-toggle-btn {
    position: absolute;
    top: 50%;
    inset-inline-end: 10px;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    display: flex;

}
.password-toggle-btn svg {
    width: 20px;
    height: 20px;

<script>
(function () {
    var EYE_OPEN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYE_CLOSED = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.3 20.3 0 0 1 5.06-5.94M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 7 11 7a20.29 20.29 0 0 1-3.22 4.43M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

    function addPasswordToggle(input) {
        if (input.dataset.toggleAdded) return;
        input.dataset.toggleAdded = "true";

        var wrapper = document.createElement('div');
        wrapper.className = 'password-input-wrapper';
        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'password-toggle-btn';
        btn.setAttribute('aria-label', 'Show password');
        btn.innerHTML = EYE_OPEN;
        wrapper.appendChild(btn);

        btn.addEventListener('click', function () {
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = EYE_CLOSED;
                btn.setAttribute('aria-label', 'Hide password');
            } else {
                input.type = 'password';
                btn.innerHTML = EYE_OPEN;
                btn.setAttribute('aria-label', 'Show password');
            }
        });
    }

    function scan() {
        document.querySelectorAll('input[type="password"]').forEach(addPasswordToggle);
    }

    function start() {
        var observer = new MutationObserver(scan);
        observer.observe(document.body, { childList: true, subtree: true });
        scan();
    }

    if (document.body) {
        start();
    } else {
        document.addEventListener('DOMContentLoaded', start);
    }
})();
</script>

    clear: both !important;
}

.view-register .register-form .form-field.select-year_of_birth label,

<script>
(function () {
    'use strict';

    function setFieldLabel(select, text) {
        if (!select) return;

        var field = select.closest('.form-field');
        if (!field) return;

        var label = field.querySelector('label .label-text');
        if (label) {
            label.textContent = text;
        }

        /* Hide the English instructional text */
        var instructions = field.querySelector('.tip-input');
        if (instructions) {
            instructions.style.display = 'none';
        }
    }

    function setPlaceholder(select, text) {
        if (!select) return;

        var emptyOption = Array.from(select.options).find(function (option) {
            return option.value === '';
        });

        if (emptyOption) {
            emptyOption.textContent = text;
        }
    }

    function customizeCountry() {
        var select = document.getElementById('register-country');

        if (!select || select.dataset.sbmfCustomized === 'true') return;

        setFieldLabel(select, 'البلد');
        setPlaceholder(select, 'اختر البلد');

        var saudiOption = Array.from(select.options).find(function (option) {
            return option.value.toUpperCase() === 'SA';
        });

        if (saudiOption) {
            saudiOption.textContent = 'المملكة العربية السعودية';

            var placeholder = Array.from(select.options).find(function (option) {
                return option.value === '';
            });

            if (placeholder) {
                placeholder.insertAdjacentElement('afterend', saudiOption);
            } else {
                select.insertBefore(saudiOption, select.firstChild);
            }
        }

        select.dataset.sbmfCustomized = 'true';
    }

    function customizeBirthYear() {
        var select = document.getElementById('register-year_of_birth');

        if (!select || select.dataset.sbmfCustomized === 'true') return;

        setFieldLabel(select, 'سنة الميلاد');
        setPlaceholder(select, 'اختر سنة الميلاد');

        select.dataset.sbmfCustomized = 'true';
    }

    function customizeGender() {
        var select = document.getElementById('register-gender');

        if (!select || select.dataset.sbmfCustomized === 'true') return;

        setFieldLabel(select, 'الجنس');
        setPlaceholder(select, 'اختر الجنس');

        Array.from(select.options).forEach(function (option) {
            if (option.value === 'm') {
                option.textContent = 'ذكر';
            } else if (option.value === 'f') {
                option.textContent = 'أنثى';
            } else if (option.value !== '') {
                option.remove();
            }
        });

        select.dataset.sbmfCustomized = 'true';
    }

    function customizeEducation() {
        var select = document.getElementById('register-level_of_education');

        if (!select || select.dataset.sbmfCustomized === 'true') return;

        setFieldLabel(select, 'المستوى التعليمي');
        setPlaceholder(select, 'اختر المستوى التعليمي');

        var educationLabels = {
            p: 'دكتوراه',
            m: 'ماجستير / شهادة مهنية',
            b: 'بكالوريوس / ليسانس',
            a: 'شهادة مهنية / دبلوم',
            hs: 'المرحلة الثانوية',
            jhs: 'المرحلة المتوسطة',
            el: 'المرحلة الابتدائية',
            none: 'دون تعليم رسمي',
            other: 'نوع آخر من التعليم'
        };

        Array.from(select.options).forEach(function (option) {
            if (educationLabels[option.value]) {
                option.textContent = educationLabels[option.value];
            }
        });

        select.dataset.sbmfCustomized = 'true';
    }

    function customizeRegistrationFields() {
        customizeCountry();
        customizeBirthYear();
        customizeGender();
        customizeEducation();
    }

    function startRegistrationCustomization() {
        customizeRegistrationFields();

        var observer = new MutationObserver(function () {
            customizeRegistrationFields();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    }

    if (document.body) {
        startRegistrationCustomization();
    } else {
        document.addEventListener(
            'DOMContentLoaded',
            startRegistrationCustomization
        );
    }
})();
</script>
